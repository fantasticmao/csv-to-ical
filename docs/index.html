<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV-to-iCal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>CSV-to-iCal</h1>
    <p>
        An online tool to convert CSV files into iCal subscription links. Edit the table below to generate your own calendar.
    </p>
    <p>
        For more information, please visit the
        <a href="https://github.com/fantasticmao/csv-to-ical" target="_blank">project page</a>.
    </p>

    <h2>Edit CSV Data, Download or Get iCal URL</h2>
    <div id="editor-controls">
        <button id="download-btn">Download CSV</button>
        <button id="get-link-btn">Get iCal URL</button>
    </div>
    <div id="csv-table-container"></div>
</div>
<script src="script.js"></script>
</body>
</html>
